
version: "2"
type: frontend
tech_stack:
  - typescript
  - nextjs
  - tailwindcss
  - shadcn-ui
  - supabase
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Landing page with product introduction and CTA
  - path: /auth
    file: app/auth/page.tsx
    auth_required: false
    description: User authentication (login and registration)
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: User dashboard showing recent analyses and stats
  - path: /products
    file: app/products/page.tsx
    auth_required: true
    description: List of saved products and detailed data
  - path: /analysis/new
    file: app/analysis/new/page.tsx
    auth_required: true
    description: Form to create a new profit analysis
  - path: /analysis/[id]
    file: app/analysis/[id]/page.tsx
    auth_required: true
    description: Detailed view of a specific analysis result
  - path: /settings
    file: app/settings/page.tsx
    auth_required: true
    description: User settings for profile, notifications, and appearance
  - path: /pricing
    file: app/pricing/page.tsx
    auth_required: false
    description: Pricing plans and upgrade options
features:
  - name: User Authentication
    description: Sign up and sign in using email and password via Supabase
    files:
      - app/auth/page.tsx
      - lib/auth.ts
    entry_route: /auth
    user_interactions:
      - Toggle between Login and Register tabs
      - Fill Email and Password fields
      - Click Submit button
      - View error/success messages
    api_calls:
      - method: POST
        endpoint: /auth/v1/signup
      - method: POST
        endpoint: /auth/v1/token
    auth_required: false
  - name: Create Profit Analysis
    description: Calculate product profit margins based on inputs
    files:
      - app/analysis/new/page.tsx
      - components/analysis/analysis-form.tsx
      - utils/calculations.ts
    entry_route: /analysis/new
    user_interactions:
      - Select Marketplace
      - Enter Product Name, Price, Cost, Commission
      - Click Calculate button
    api_calls: []
    auth_required: true
  - name: Dashboard Overview
    description: View summary of analyses and navigate to details
    files:
      - app/dashboard/page.tsx
      - components/dashboard/recent-analyses.tsx
    entry_route: /dashboard
    user_interactions:
      - View stats cards
      - Click on a recent analysis item
    api_calls:
      - method: GET
        endpoint: /rest/v1/analyses
    auth_required: true
  - name: Settings Management
    description: Manage account settings including email notifications
    files:
      - app/settings/page.tsx
      - lib/notification-service.ts
    entry_route: /settings
    user_interactions:
      - Toggle Dark Mode
      - Toggle Email Notifications
      - Click Send Test Email button
    api_calls:
      - method: POST
        endpoint: /api/notifications/test-email
    auth_required: true
known_limitations: []
